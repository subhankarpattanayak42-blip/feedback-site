<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback & Ratings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #0b0e17 0%, #1a1f35 50%, #0f1322 100%);
      min-height: 100vh;
      color: #e8e8ed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 4px; height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      animation: float linear infinite;
    }
    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(0.5); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 48px 40px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .card-header { text-align: center; margin-bottom: 36px; }
    .card-header .icon { font-size: 48px; margin-bottom: 12px; display: block; }
    .card-header h1 {
      font-size: 28px; font-weight: 700;
      background: linear-gradient(135deg, #f0e6ff 0%, #c4b5fd 50%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    .card-header p { font-size: 15px; color: #9ca3af; margin-top: 8px; }

    /* Rating */
    .rating-section { margin-bottom: 32px; text-align: center; }
    .rating-section > .section-label {
      display: block; font-size: 14px; font-weight: 600;
      color: #d1d5db; margin-bottom: 18px;
      text-transform: uppercase; letter-spacing: 1.2px;
    }

    .stars { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; }
    .stars input { display: none; }
    .stars label {
      cursor: pointer; font-size: 44px; color: #374151;
      transition: all 0.2s ease; line-height: 1; user-select: none;
    }
    .stars label:hover,
    .stars label:hover ~ label,
    .stars input:checked ~ label {
      color: #fbbf24;
      text-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
      transform: scale(1.05);
    }
    .stars label:active { transform: scale(0.9); }

    .rating-badge {
      display: none; align-items: center; justify-content: center;
      gap: 10px; margin: 14px auto 0; padding: 10px 22px;
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.25);
      border-radius: 999px; width: fit-content;
      animation: badgePop 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes badgePop {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .rating-badge.visible { display: inline-flex; }
    .rating-badge .stars-display { font-size: 20px; letter-spacing: 2px; }
    .rating-badge .rating-number { font-size: 20px; font-weight: 800; color: #fbbf24; }
    .rating-badge .rating-label {
      font-size: 13px; font-weight: 500; color: #d4a72c;
      padding: 2px 10px; background: rgba(251, 191, 36, 0.12); border-radius: 20px;
    }
    #rating-text {
      display: block; margin-top: 10px; font-size: 13px;
      color: #6b7280; min-height: 20px; transition: color 0.3s ease;
    }

    /* Form fields */
    .form-group { margin-bottom: 22px; }
    .form-group label {
      display: block; font-size: 13px; font-weight: 600;
      color: #9ca3af; margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .form-group label .optional {
      font-weight: 400; text-transform: none; letter-spacing: 0;
      color: #6b7280; font-size: 12px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%; padding: 14px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; color: #e8e8ed; font-size: 15px;
      font-family: 'Inter', sans-serif; outline: none;
      transition: all 0.25s ease;
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: #4b5563; }
    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #a78bfa;
      background: rgba(167, 139, 250, 0.08);
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.15);
    }
    .form-group textarea { min-height: 130px; resize: vertical; }

    .submit-btn {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%);
      border: none; border-radius: 14px; color: #fff; font-size: 16px;
      font-weight: 600; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: all 0.3s ease;
    }
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(124, 58, 237, 0.35);
    }
    .submit-btn:active { transform: translateY(0); }

    .footer { text-align: center; margin-top: 24px; font-size: 12px; color: #4b5563; }

    @media (max-width: 480px) {
      .card { padding: 32px 20px; border-radius: 20px; }
      .card-header h1 { font-size: 22px; }
      .stars label { font-size: 36px; }
      .rating-badge { flex-wrap: wrap; padding: 8px 16px; }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <div class="card">
    <div class="card-header">
      <span class="icon">💬</span>
      <h1>We Value Your Feedback</h1>
      <p>Your opinion helps us improve. Share your thoughts below.</p>
    </div>

    <form id="feedback-form" action="https://formsubmit.co/subhankar@agentmail.to" method="POST">
      <!-- FormSubmit config -->
      <input type="hidden" name="_subject" value="New Feedback Received">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_captcha" value="true">
      <input type="hidden" name="_next" value="https://subhankarpattanayak42-blip.github.io/feedback-site/thank-you.html">
      <input type="hidden" name="_autoresponse" value="Thank you for your feedback! We appreciate you taking the time to share your thoughts.">

      <!-- Rating -->
      <div class="rating-section">
        <span class="section-label">Your Rating</span>

        <div class="stars">
          <input type="radio" name="Rating" id="star5" value="5 - Excellent">
          <label for="star5" title="5 stars — Excellent">★</label>
          <input type="radio" name="Rating" id="star4" value="4 - Great">
          <label for="star4" title="4 stars — Great">★</label>
          <input type="radio" name="Rating" id="star3" value="3 - Good">
          <label for="star3" title="3 stars — Good">★</label>
          <input type="radio" name="Rating" id="star2" value="2 - Fair">
          <label for="star2" title="2 stars — Fair">★</label>
          <input type="radio" name="Rating" id="star1" value="1 - Poor">
          <label for="star1" title="1 star — Poor">★</label>
        </div>

        <div class="rating-badge" id="rating-badge">
          <span class="stars-display" id="badge-stars"></span>
          <span class="rating-number" id="badge-number"></span>
          <span class="rating-label" id="badge-label"></span>
        </div>

        <span id="rating-text">Tap a star to rate</span>
      </div>

      <!-- Name (Optional) -->
      <div class="form-group">
        <label>Your Name <span class="optional">(optional)</span></label>
        <input type="text" name="Name" placeholder="Enter your name" autocomplete="name">
      </div>

      <!-- Feedback -->
      <div class="form-group">
        <label>Your Feedback</label>
        <textarea name="Feedback" placeholder="Tell us what you think... What did you like? What could be better?" required></textarea>
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">
        Submit Feedback ✨
      </button>
    </form>

    <div class="footer">Name is optional. Your feedback goes directly to the team.</div>
  </div>

  <script>
    // ─── Floating particles ───
    const pc = document.getElementById('particles');
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.width = p.style.height = (1 + Math.random() * 4) + 'px';
      p.style.animationDuration = (8 + Math.random() * 20) + 's';
      p.style.animationDelay = (Math.random() * 15) + 's';
      p.style.opacity = 0.1 + Math.random() * 0.3;
      pc.appendChild(p);
    }

    // ─── Rating badge ───
    const ratingInputs = document.querySelectorAll('.stars input');
    const badgeStars   = document.getElementById('badge-stars');
    const badgeNumber  = document.getElementById('badge-number');
    const badgeLabel   = document.getElementById('badge-label');
    const badge        = document.getElementById('rating-badge');
    const ratingText   = document.getElementById('rating-text');
    const labels = ['', 'Poor', 'Fair', 'Good', 'Great', 'Excellent'];

    ratingInputs.forEach(input => {
      input.addEventListener('change', function() {
        const val = parseInt(this.value);
        badgeStars.textContent  = '★'.repeat(val) + '☆'.repeat(5 - val);
        badgeNumber.textContent = val + '/5';
        badgeLabel.textContent  = labels[val];
        badge.classList.add('visible');
        ratingText.textContent  = 'You rated: ' + labels[val] + ' (' + val + '/5)';
        ratingText.style.color  = '#fbbf24';
      });
    });

    // HTML form submits naturally — no JS fetch, no CORS issues
    // FormSubmit handles the rest and redirects to thank-you page
  </script>
</body>
</html>
